version: "3.8"
services:
  tarjan:
    build:
      context: .
      dockerfile: Dockerfile.java
    container_name: bench_tarjan
    volumes:
      - ./inputs:/app/inputs
      - ./resultados:/app/resultados
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "6.0"
        reservations:
          memory: 8g
          cpus: "6.0"

